<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width">
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@600&display=swap" />
    <title>SEC Socorrismo</title>
</head>
<body>

    <div class="login">
        <div class="login-child"></div> 
        
        <form action="inicio.html" class="rectangle-parent">
            
            <div class="group-child"></div>
            <img class="isotipo" src="img/ISOTIPOSEC1.svg" alt="Logo SEC">
            
            <div class="sistema-de-voluntarios">Sistema de Voluntarios</div>
            
            <div class="email-field-text-wrapper">
                <img class="mail" src="img/Mail.svg" alt="Icono mail">
                <input type="email" class="email-rectangle" placeholder="Correo electrónico" required>
            </div>
            
            <div class="password-field-text">
                <img class="key" src="img/Key.svg" alt="Icono llave">
                <input type="password" class="password-rectangle" placeholder="Contraseña" required>
            </div>
            
            <button type="submit" class="button">
                <div class="button2">Ingresar</div>
            </button>
            
        </form>
    </div>

</body>
</html>
